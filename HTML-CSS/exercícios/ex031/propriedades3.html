<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mais propriedades grid</title>
    <style>
        div.container {  
            display: grid;
            grid-template-columns: auto auto auto auto;
            grid-template-rows: 100px 100px 100px; /* Pode colocar só uma vez se for o mesmo pra todas as linhas e colunas*/
            border: 5px solid blue;
            gap: 5px;
            padding: 10px;
            margin: 10px;
        }
        .caixa1 {
            grid-row: 1/2;
            grid-column: 1/-1;
            border: 3px solid red;
            background-color: red;
        }

        div.item {
            border: 3px solid red;
        }
          

    </style>
</head>
<body>
      <div class="container">
        <div class="caixa1">A</div>
        <div class="caixa2">B</div>
        <div class="item">C</div>
        <div class="item">D</div>
        <div class="item">E</div>
        <div class="item">F</div>
        <div class="item">G</div>
    </div>
    
</body>
</html>
