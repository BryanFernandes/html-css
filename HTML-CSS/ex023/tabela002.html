<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <STYLE>
    table {
        font-family: Arial, Helvetica, sans-serif;
        width: 500px;
    }

    td,th {
        border: 1px solid black;
        border-collapse: collapse;
    }

    thead, tfoot {
        background-color: lightgray;
    }

    caption {
        font-size: 1.5em;
        font-weight: bold;
        padding: 10px;
        background-color: gray;
    }
    </STYLE>
</head>
<body>
    <h1>Uso de tabelas grandes</h1>
    <!--
    Anatomia para tabelas grandes
    TABLE 
      CAPTION- legenda 
       THEAD 
         TR,TD,TH
       TBODY
         TR,TD,TH
       TFOOT
         TR,TD,TH-->

    <table>
        <caption>População brasileira por estado</caption>
        <thead>
            <tr>
                <th>Estado</th>
                <th>População</th>
            </tr>

        </thead>

        <tbody>
            <tr>
                <td>São Paulo</td>
                <td>45.919.949</td>
            <tr>

            <tr>
                    <td>Minas Gerais</td>
                    <td>21.168.791</td>
            </tr>
    

        </tbody>

        <tfoot>
           <tr>
            <td>Total de habitantes</td>
            <td>100.000.000</td>
           </tr>
        </tfoot>
    </table>
    
</body>
</html>
