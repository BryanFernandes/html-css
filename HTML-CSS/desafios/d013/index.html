<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grid Layout desafio</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }

        .projeto{
            display: grid;
            grid-template-columns: 70% 30%;
            grid-template-rows: 20% 10% 60% 10%;
            height: 80vh;
            background-color: rgba(255, 255, 0, 0.527);  
        }

        .topo{
            grid-area: 1/1/2/-1;
            border: 3px solid blue;
        }

        .menu{
            grid-area: 2/1/3/-1;
            border: 3px solid blue;
        }

        .principal{
            grid-area: 3/1/4/-2;
            border: 3px solid blue;
        }

        .secundário{
            grid-area: 3/2/4/-1;
            border: 3px solid blue;
        }

        .rodapé{
            grid-area: 4/1/4/-1;
            border: 3px solid blue;
        }

    </style>

</head>
<body>

    <div class="projeto">
        <div class="topo">topo</div>
        <div class="menu">menu</div>
        <div class="principal">principal</div>
        <div class="secundário">secundário</div>
        <div class="rodapé">rodapé</div>
    </div>
    
</body>
</html>
